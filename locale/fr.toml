"help.logline.documentation" = "Enregistre le texte dans le journal Picard. Par défaut, l'entrée sera enregistrée au niveau `Info`, mais il est possible de modifier ce niveau en spécifiant un autre niveau en tant que deuxième paramètre facultatif. Les niveaux de journalisation autorisés sont les suivants :\n\n- E (Erreur)\n- W (Avertissement)\n- I (Info)\n- D (Débogage)\n\nSi un niveau inconnu est spécifié, la fonction utilisera le niveau par défaut `Info`."
"help.logline.signature" = "$logline(texte[,niveau])"
"manifest.description" = "Ce plugin fournit une nouvelle fonction de script, `$logline()`, permettant d'enregistrer des entrées dans le journal système de Picard."
"manifest.long_description" = "Ce plugin fournit une nouvelle fonction de script `$logline()` permettant d'écrire des entrées dans le journal système de Picard. Par défaut, le niveau de journalisation est défini sur `Info`, mais il est possible d'utiliser n'importe quel niveau en le spécifiant comme deuxième paramètre facultatif de la fonction.\n\nLa fonction s'utilise comme suit :\n\n`$logline(texte[,niveau])`\n\noù `texte` correspond au texte à écrire dans le journal. L'entrée sera écrite au niveau de journalisation `Info` par défaut, mais cela peut être modifié en spécifiant un niveau différent en tant que deuxième paramètre facultatif. Les niveaux de journalisation autorisés sont :\n\n- E (Erreur) - W (Avertissement) - I (Info) - D (Débogage)\n\nSi un niveau inconnu est saisi, la fonction utilisera le niveau par défaut `Info`."
"manifest.name" = "Enregistreur de scripts"

